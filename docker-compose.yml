services:
  backend:
    build:
      context: ./backend
      target: runtime
    environment:
      - ENV=production
    env_file: .env
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  db_data:
